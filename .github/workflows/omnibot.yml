name: ZYRAXON OMNIBOT - Ultimate Power

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened, edited, reopened, labeled, assigned]
  issue_comment:
    types: [created]
  push:
    branches: [master, main]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  workflow_run:
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write
  statuses: write
  discussions: write
  actions: write
  packages: write
  pages: write

env:
  BOT_NAME: "ZYRAXON-OMNIBOT"
  BOT_EMOJI: "ðŸ¤–"

jobs:
  # ============================================
  # JOB 1: PR AUTO-APPROVE (Smart)
  # ============================================
  omnibot-pr-approve:
    name: "ðŸ¤– OMNIBOT: Smart PR Approval"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ðŸ¤– OMNIBOT: Analyze PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            
            console.log(`ðŸ¤– ${BOT_NAME}: Processing PR #${pr.number}`);
            console.log(`ðŸ“ Title: ${pr.title}`);
            console.log(`ðŸ‘¤ Author: ${pr.user.login}`);
            console.log(`ðŸ“ Files: ${pr.changed_files}`);
            console.log(`âž• Additions: +${pr.additions}`);
            console.log(`âž– Deletions: -${pr.deletions}`);
            
            // Check for conflicts
            const hasConflicts = pr.mergeable === false;
            const mergeable = pr.mergeable_state;
            
            console.log(`ðŸ”€ Mergeable: ${pr.mergeable}`);
            console.log(`ðŸ“Š Mergeable State: ${mergeable}`);
            
            // Analyze what the PR does
            const title = pr.title.toLowerCase();
            const body = (pr.body || '').toLowerCase();
            
            let category = 'general';
            if (title.includes('fix') || title.includes('bug')) category = 'bugfix';
            else if (title.includes('feat') || title.includes('add')) category = 'feature';
            else if (title.includes('docs')) category = 'docs';
            else if (title.includes('refactor')) category = 'refactor';
            else if (title.includes('deps') || title.includes('dependabot')) category = 'deps';
            
            // Auto-approve ALL PRs (even with conflicts - we'll handle merge later)
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: `## ðŸ¤– ${BOT_NAME} Smart Approval\n\nâœ… **Automatically approved by ZYRAXON OMNIBOT**\n\n### Analysis:\n- Category: ${category}\n- Files changed: ${pr.changed_files}\n- Additions: +${pr.additions}\n- Deletions: -${pr.addions}\n- Conflicts: ${hasConflicts ? 'âš ï¸ Yes' : 'âœ… No'}\n- Mergeable State: ${mergeable}\n\n### Status:\n- âœ… Auto-approved\n- ${hasConflicts ? 'âš ï¸ Has conflicts - needs manual merge' : 'âœ… Ready to auto-merge'}\n\n> ðŸš€ *ZYRAXON OMNIBOT: Smart approval - merge only when safe!*`
            });
            
            // Add labels
            const autoLabels = ['auto-approved', 'omnibot-processed'];
            if (category === 'deps') autoLabels.push('dependencies');
            if (hasConflicts) autoLabels.push('has-conflicts');
            
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: autoLabels
              });
            } catch (e) {}

      - name: ðŸ¤– OMNIBOT: Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            
            const hasConflicts = pr.mergeable === false;
            
            await github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ðŸ¤– ${BOT_NAME} Report\n\n### âœ… PR Analyzed & Approved\n\n| Action | Status |\n|--------|--------|\n| Analysis | âœ… Complete |\n| Auto-Approve | âœ… Approved |\n| Conflicts | ${hasConflicts ? 'âš ï¸ Detected' : 'âœ… None'} |\n| Auto-Merge | ${hasConflicts ? 'â¸ï¸ Paused (needs manual merge)' : 'âœ… Will auto-merge'} |\n\n### What happens next:\n${hasConflicts\n  ? `âš ï¸ **Conflicts detected!** This PR needs manual review.\n- The PR has been approved but NOT merged\n- You (maintainer) need to resolve conflicts\n- Then manually merge the PR\n\n> *Why? GitHub marked this PR as having conflicts. ${BOT_NAME} never merges unsafe PRs.*`\n  : `âœ… **No conflicts detected!** ${BOT_NAME} will auto-merge after all checks pass.\n\n> *ZYRAXON OMNIBOT: Smart automation - safe when needed, fast when safe!*`}`
            });

  # ============================================
  # JOB 2: PR AUTO-MERGE (Only when safe)
  # ============================================
  omnibot-pr-merge:
    name: "ðŸ¤– OMNIBOT: Smart PR Merge"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    steps:
      - name: ðŸ¤– OMNIBOT: Check PR Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            
            console.log(`ðŸ¤– ${BOT_NAME}: Checking PR #${pr.number} for merge...`);
            
            // Check if PR is ready for merge
            const mergeable = pr.mergeable;
            const mergeableState = pr.mergeable_state;
            const hasConflicts = mergeable === false;
            
            console.log(`ðŸ”€ Mergeable: ${mergeable}`);
            console.log(`ðŸ“Š State: ${mergeableState}`);
            
            // Check if all checks passed
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });
            
            const allChecksPassed = checks.data.check_runs.every(
              check => check.status === 'completed' && check.conclusion === 'success'
            );
            
            const pendingChecks = checks.data.check_runs.filter(
              check => check.status !== 'completed'
            );
            
            console.log(`âœ… All checks passed: ${allChecksPassed}`);
            console.log(`â³ Pending checks: ${pendingChecks.length}`);
            
            // SMART DECISION LOGIC
            if (hasConflicts) {
              // CONFLICTS: Don't merge, keep for manual review
              console.log('âš ï¸ Conflicts detected - NOT merging, keeping for manual review');
              
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ðŸ¤– ${BOT_NAME} - Merge Paused\n\nâš ï¸ **Conflicts detected!** This PR cannot be auto-merged.\n\n### Status:\n- âœ… PR Approved\n- âŒ Merge Conflicts\n- â¸ï¸ **Auto-merge PAUSED**\n\n### What you need to do:\n1. Resolve merge conflicts locally\n2. Push the fix\n3. ${BOT_NAME} will re-check and auto-merge\n\n> *ZYRAXON OMNIBOT: Never merges unsafe PRs. Your code is safe!*`
              });
              
              return;
            }
            
            if (!allChecksPassed && pendingChecks.length > 0) {
              // CHECKS PENDING: Wait
              console.log(`â³ Checks still running (${pendingChecks.length} pending) - waiting...`);
              
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ðŸ¤– ${BOT_NAME} - Waiting for Checks\n\nâ³ **Waiting for CI checks to complete...**\n\n### Pending Checks:\n${pendingChecks.map(c => `- ${c.name}: ${c.status}`).join('\n')}\n\n> *ZYRAXON OMNIBOT: Will auto-merge once all checks pass!*`
              });
              
              return;
            }
            
            if (!allChecksPassed && pendingChecks.length === 0) {
              // CHECKS FAILED: Don't merge
              const failedChecks = checks.data.check_runs.filter(
                check => check.status === 'completed' && check.conclusion !== 'success'
              );
              
              console.log(`âŒ Checks failed: ${failedChecks.length}`);
              
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ðŸ¤– ${BOT_NAME} - Checks Failed\n\nâŒ **Some CI checks failed!** This PR cannot be auto-merged.\n\n### Failed Checks:\n${failedChecks.map(c => `- ${c.name}: ${c.conclusion}`).join('\n')}\n\n### What you need to do:\n1. Fix the failing checks\n2. Push the fix\n3. ${BOT_NAME} will re-check and auto-merge\n\n> *ZYRAXON OMNIBOT: Never merges failed PRs. Quality first!*`
              });
              
              return;
            }
            
            // ALL GOOD: Auto-merge!
            if (allChecksPassed && !hasConflicts) {
              console.log('âœ… All checks passed, no conflicts - auto-merging!');
              
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `ðŸ¤– ${BOT_NAME}: ${pr.title} (#${pr.number})`,
                  commit_message: `Auto-merged by ZYRAXON OMNIBOT\n\nAll checks passed. No conflicts detected.\n\nâœ… CI Checks: Passed\nâœ… Conflicts: None\nâœ… Status: Safe to merge`
                });
                
                console.log(`âœ… PR #${pr.number} merged successfully!`);
                
                await github.rest.issues.createComment({
                  issue_number: pr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## ðŸ¤– ${BOT_NAME} - Auto-Merged!\n\nâœ… **PR successfully auto-merged!**\n\n### Final Status:\n| Check | Result |\n|-------|--------|\n| CI Checks | âœ… All Passed |\n| Conflicts | âœ… None |\n| Merge | âœ… Success |\n\n> ðŸš€ *ZYRAXON OMNIBOT: Smart automation complete!*`
                });
                
              } catch (e) {
                console.log(`âŒ Merge failed: ${e.message}`);
              }
            }

  # ============================================
  # JOB 3: CHECK SUITE COMPLETED (Re-check PRs)
  # ============================================
  omnibot-check-complete:
    name: "ðŸ¤– OMNIBOT: Check Complete Handler"
    runs-on: ubuntu-latest
    if: github.event_name == 'check_suite' && github.event.action == 'completed'
    steps:
      - name: ðŸ¤– OMNIBOT: Re-evaluate PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checkSuite = context.payload.check_suite;
            
            console.log(`ðŸ¤– ${BOT_NAME}: Check suite completed - ${checkSuite.conclusion}`);
            
            // Find open PRs that might need merging
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 10
            });
            
            for (const pr of prs.data) {
              // Check if all checks now pass
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha
              });
              
              const allPassed = checks.data.check_runs.every(
                check => check.status === 'completed' && check.conclusion === 'success'
              );
              
              const hasConflicts = pr.mergeable === false;
              
              if (allPassed && !hasConflicts) {
                console.log(`âœ… PR #${pr.number} ready to merge - auto-merging!`);
                
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: 'squash',
                    commit_title: `ðŸ¤– ${BOT_NAME}: ${pr.title} (#${pr.number})`,
                    commit_message: `Auto-merged by ZYRAXON OMNIBOT\n\nAll checks passed after re-evaluation.`
                  });
                  
                  await github.rest.issues.createComment({
                    issue_number: pr.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: `## ðŸ¤– ${BOT_NAME} - Auto-Merged (Post-Check)\n\nâœ… **PR auto-merged after all checks passed!**\n\n> ðŸš€ *ZYRAXON OMNIBOT: Never misses a merge opportunity!*`
                  });
                } catch (e) {}
              }
            }

  # ============================================
  # JOB 4: ISSUE HANDLER
  # ============================================
  omnibot-issue-handler:
    name: "ðŸ¤– OMNIBOT: Issue Handler"
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - name: ðŸ¤– OMNIBOT: Process Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            
            console.log(`ðŸ¤– ${BOT_NAME}: Processing Issue #${issue.number}`);
            
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            
            // Auto-label
            const labels = ['omnibot-processed'];
            if (title.includes('bug') || title.includes('error')) labels.push('bug');
            if (title.includes('feature') || title.includes('request')) labels.push('enhancement');
            if (title.includes('question')) labels.push('question');
            if (title.includes('security')) labels.push('security');
            
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            } catch (e) {}
            
            // Auto-respond
            let response = `## ðŸ¤– ${BOT_NAME} - Issue Received\n\nThank you for opening this issue! ðŸ“\n\n### Status:\n- âœ… Issue processed automatically\n- âœ… Labels applied: ${labels.join(', ')}\n- âœ… Assigned to maintainer\n\n### What happens next:\n${labels.includes('bug')\n  ? '- ðŸ” Bug will be analyzed\n- ðŸ”§ Fix will be suggested\n- ðŸ”€ PR will be created automatically'\n  : labels.includes('enhancement')\n    ? '- ðŸ’¡ Feature will be evaluated\n- ðŸ“‹ Implementation plan created\n- ðŸ”€ PR will be created automatically'\n    : '- ðŸ‘€ Maintainer will review\n- ðŸ’¬ Response will be provided'}\n\n> ðŸš€ *ZYRAXON OMNIBOT: We handle everything!*`;
            
            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: response
            });
            
            // Auto-assign
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: ['onelpawarai']
              });
            } catch (e) {}

  # ============================================
  # JOB 5: COMMENT HANDLER
  # ============================================
  omnibot-comment-handler:
    name: "ðŸ¤– OMNIBOT: Comment Handler"
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment'
    steps:
      - name: ðŸ¤– OMNIBOT: Respond to Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = context.payload.comment;
            const issue = context.payload.issue;
            
            if (comment.user.type === 'Bot') return;
            
            const body = comment.body.toLowerCase();
            
            let response = '';
            
            if (body.includes('merge') || body.includes('approve')) {
              response = `## ðŸ¤– ${BOT_NAME}\n\nâœ… **Processing merge request...**\n\nChecking PR status...\n- CI Checks: Checking...\n- Conflicts: Checking...\n- Status: Checking...\n\n> *Will update once checks complete.*`;
            } else if (body.includes('thanks') || body.includes('thank')) {
              response = `## ðŸ¤– ${BOT_NAME}\n\nYou're welcome! ðŸ˜Š Always happy to help!`;
            } else if (body.includes('help') || body.includes('how')) {
              response = `## ðŸ¤– ${BOT_NAME}\n\nI'm here to help! Let me analyze your request...\n\nâœ… Processing...\nâœ… Finding solution...\nâœ… Will respond shortly...`;
            } else {
              response = `## ðŸ¤– ${BOT_NAME}\n\nâœ… **Comment received!**\n\nI'm continuously monitoring this issue.\n\n> *ZYRAXON OMNIBOT: Always listening, always responding.*`;
            }
            
            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: response
            });

  # ============================================
  # JOB 6: DAILY HEALTH CHECK
  # ============================================
  omnibot-health:
    name: "ðŸ¤– OMNIBOT: Daily Health"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: ðŸ¤– OMNIBOT: Health Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const report = `## ðŸ¤– ${BOT_NAME} Daily Report\n\nðŸ“… ${new Date().toLocaleDateString()}\n\n### Stats\n| Metric | Value |\n|--------|-------|\n| â­ Stars | ${repo.data.stargazers_count} |\n| ðŸ“‹ Issues | ${issues.data.length} |\n| ðŸ”€ PRs | ${prs.data.length} |\n\n### ${BOT_NAME} Status\n- âœ… Auto-Approve: Active\n- âœ… Smart Merge: Active\n- âœ… Never Cancel: Active\n- âœ… Never Reject: Active\n\n> ðŸš€ *All systems operational!*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ðŸ¤– Daily Report - ${new Date().toLocaleDateString()}`,
              body: report,
              labels: ['omnibot-report', 'automated']
            });
