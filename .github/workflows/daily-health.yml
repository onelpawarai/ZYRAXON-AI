# ZYRAXON OMNIBOT - Daily Health Check
name: Daily Health Check

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  health-check:
    name: "ðŸ¤– Daily Health Check"
    runs-on: ubuntu-latest
    steps:
      - name: ðŸ¤– OMNIBOT: Generate Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Get repo stats
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            // Get open issues
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            // Get open PRs
            const openPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            // Get recent releases
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 5
            });
            
            // Calculate stats
            const issues = openIssues.data.filter(i => !i.pull_request);
            const prs = openPRs.data;
            const bugIssues = issues.filter(i => i.labels.some(l => l.name === 'bug'));
            const featureIssues = issues.filter(i => i.labels.some(l => l.name === 'enhancement'));
            
            const report = `## ðŸ¤– ZYRAXON OMNIBOT - Daily Health Report\n\nðŸ“… **Date:** ${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}\n\n### ðŸ“Š Repository Statistics\n| Metric | Value | Status |\n|--------|-------|--------|\n| â­ Stars | ${repo.data.stargazers_count} | ${repo.data.stargazers_count > 10 ? 'ðŸŸ¢ Growing' : 'ðŸŸ¡ Building'} |\n| ðŸ´ Forks | ${repo.data.forks_count} | ðŸŸ¢ Active |\n| ðŸ‘ï¸ Watchers | ${repo.data.subscribers_count} | ðŸŸ¢ Active |\n| ðŸ“‹ Open Issues | ${issues.length} | ${issues.length < 10 ? 'ðŸŸ¢ Healthy' : 'ðŸŸ¡ Needs attention'} |\n| ðŸ”€ Open PRs | ${prs.length} | ${prs.length < 5 ? 'ðŸŸ¢ Healthy' : 'ðŸŸ¡ Needs attention'} |\n| ðŸ› Bug Reports | ${bugIssues.length} | ${bugIssues.length === 0 ? 'ðŸŸ¢ None' : 'ðŸŸ¡ Active'} |\n| âœ¨ Feature Requests | ${featureIssues.length} | ${featureIssues.length === 0 ? 'ðŸŸ¢ None' : 'ðŸŸ¡ Active'} |\n\n### ðŸ¤– OMNIBOT Status\n| Feature | Status |\n|---------|--------|\n| Auto-Approve PRs | âœ… Active |\n| Auto-Merge PRs | âœ… Active |\n| Auto-Respond Issues | âœ… Active |\n| Auto-Label | âœ… Active |\n| Auto-Release | âœ… Active |\n| Never Cancel | âœ… Active |\n| Never Reject | âœ… Active |\n\n### ðŸ“¦ Recent Releases\n${releases.data.length > 0 ? releases.data.map(r => `- [${r.tag_name}](${r.html_url}) - ${new Date(r.published_at).toLocaleDateString()}`).join('\n') : '- No releases yet'}\n\n### ðŸŽ¯ Today's Tasks\n- [x] Monitor new issues\n- [x] Auto-approve PRs\n- [x] Auto-merge ready PRs\n- [x] Update dependencies\n- [x] Generate health report\n\n---\n\n> ðŸš€ *ZYRAXON OMNIBOT: Keeping everything running smoothly 24/7!*\n> \n> *Last updated: ${new Date().toISOString()}*`;
            
            // Create issue with report
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ðŸ¤– Daily Health Report - ${new Date().toLocaleDateString()}`,
              body: report,
              labels: ['omnibot-report', 'automated', 'health-check']
            });
            
            console.log('âœ… Health report created!');
