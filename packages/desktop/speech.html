<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SPEECH</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }
  #bar {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    background: rgba(20, 20, 28, 0.92);
    border: 1px solid rgba(120, 80, 255, 0.3);
    border-radius: 12px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
  }
  #mic-icon {
    width: 22px; height: 22px;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #mic-icon svg { width: 18px; height: 18px; fill: #aaa; transition: fill 0.2s; }
  #mic-icon.listening svg { fill: #ff4466; }
  #mic-icon.listening::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255, 68, 102, 0.25);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.6); opacity: 0; }
  }
  #status {
    font-size: 12px;
    font-weight: 500;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  #status.active { color: #ff4466; }
  #status.error { color: #ff6b6b; }
  #close-btn {
    -webkit-app-region: no-drag;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #close-btn:hover { background: rgba(255,255,255,0.1); }
  #close-btn svg { width: 12px; height: 12px; fill: #666; }
</style>
</head>
<body>
<div id="bar">
  <div id="mic-icon">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </div>
  <div id="status">Ready</div>
  <div id="close-btn" onclick="window.speechBridge.sendState(false)">
    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </div>
</div>
<script>
(function() {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognition = null;
  var isListening = false;
  var statusEl = document.getElementById('status');
  var micIcon = document.getElementById('mic-icon');

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
    if (cls === 'active') micIcon.className = 'listening';
    else micIcon.className = '';
  }

  function start(lang) {
    if (!SpeechRecognition) {
      setStatus('Not supported', 'error');
      window.speechBridge.sendError('Speech recognition not supported in this environment');
      return;
    }
    if (isListening) return;

    setStatus('Starting...', '');

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = lang || 'en-US';
    recognition.maxAlternatives = 1;

    recognition.onstart = function() {
      isListening = true;
      setStatus('Listening...', 'active');
      window.speechBridge.sendState(true);
    };

    recognition.onresult = function(event) {
      for (var i = event.resultIndex; i < event.results.length; i++) {
        var result = event.results[i];
        var text = result[0].transcript;
        if (result.isFinal) {
          setStatus(text, 'active');
        }
        window.speechBridge.sendResult(text, result.isFinal);
      }
    };

    recognition.onerror = function(event) {
      if (event.error === 'no-speech') {
        setStatus('No speech detected', '');
        return;
      }
      if (event.error === 'aborted') return;

      var msg = 'Speech error: ' + event.error;
      if (event.error === 'not-allowed') {
        msg = 'Mic permission denied';
      } else if (event.error === 'audio-capture') {
        msg = 'No microphone found';
      } else if (event.error === 'network') {
        msg = 'Network error';
      }
      setStatus(msg, 'error');
      window.speechBridge.sendError(msg);
    };

    recognition.onend = function() {
      if (isListening && recognition) {
        try { recognition.start(); } catch(e) {}
        return;
      }
      setStatus('Stopped', '');
      window.speechBridge.sendState(false);
    };

    try {
      recognition.start();
    } catch(e) {
      setStatus('Failed: ' + e.message, 'error');
      window.speechBridge.sendError('Failed to start: ' + e.message);
    }
  }

  function stop() {
    isListening = false;
    if (recognition) {
      recognition.onend = null;
      try { recognition.stop(); } catch(e) {}
      recognition = null;
    }
    setStatus('Stopped', '');
    window.speechBridge.sendState(false);
  }

  window.speechBridge.onCommand(function(command, lang) {
    if (command === 'start') start(lang);
    else if (command === 'stop') stop();
  });
})();
</script>
</body>
</html>
