name: "ZYRAXON GitHub Action"
description: "Run ZYRAXON in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the ZYRAXON session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of ZYRAXON App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/ZYRAXON,/oc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.ZYRAXON.ai"
    required: false

  # ZYRAXON-specific inputs
  mcp_tools_enabled:
    description: "Enable MCP tools (defaults to true)"
    required: false
    default: "true"

  streaming_enabled:
    description: "Enable YouTube streaming (defaults to false)"
    required: false
    default: "false"

  self_healing_enabled:
    description: "Enable self-healing (defaults to true)"
    required: false
    default: "true"

  memory_system_enabled:
    description: "Enable memory system (defaults to true)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Get ZYRAXON version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/onelpawarai/ZYRAXON-AI/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache ZYRAXON
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.ZYRAXON/bin
        key: ZYRAXON-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install ZYRAXON
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://ZYRAXON.ai/install | bash

    - name: Add ZYRAXON to PATH
      shell: bash
      run: echo "$HOME/.ZYRAXON/bin" >> $GITHUB_PATH

    - name: Run ZYRAXON
      shell: bash
      id: run_ZYRAXON
      run: ZYRAXON github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
        # ZYRAXON-specific environment variables
        ZYRAXON_MCP_TOOLS_ENABLED: ${{ inputs.mcp_tools_enabled }}
        ZYRAXON_STREAMING_ENABLED: ${{ inputs.streaming_enabled }}
        ZYRAXON_SELF_HEALING_ENABLED: ${{ inputs.self_healing_enabled }}
        ZYRAXON_MEMORY_SYSTEM_ENABLED: ${{ inputs.memory_system_enabled }}
